name: Fetch App Assets

# Öffne im Browser: github.com/Jiujazu/glowing-earrings/actions/workflows/fetch-app-assets.yml
# Klicke "Run workflow", fülle das Formular aus, warte ~30 Sekunden.
# Ein Pull Request mit den gefundenen Bildern wird automatisch geöffnet.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Kurs-Slug (z.B. handy-speech-to-text) — Ordner unter content/courses/"
        required: true
        type: string
      url:
        description: "Webseiten-URL (z.B. https://handy.computer/) — optional"
        required: false
        type: string
      ios:
        description: "iOS App Store ID (z.B. 284882215) — optional, nur für Mobile-Apps"
        required: false
        type: string
      android:
        description: "Android Package (z.B. com.whatsapp) — optional, nur für Mobile-Apps"
        required: false
        type: string
      limit:
        description: "Maximale Anzahl Bilder pro Quelle"
        required: false
        type: string
        default: "10"

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate inputs
        env:
          URL: ${{ inputs.url }}
          IOS: ${{ inputs.ios }}
          ANDROID: ${{ inputs.android }}
        run: |
          if [ -z "$URL" ] && [ -z "$IOS" ] && [ -z "$ANDROID" ]; then
            echo "::error::Mindestens eine Quelle angeben: url, ios oder android."
            exit 1
          fi

      - name: Run fetch script
        env:
          SLUG: ${{ inputs.slug }}
          URL: ${{ inputs.url }}
          IOS: ${{ inputs.ios }}
          ANDROID: ${{ inputs.android }}
          LIMIT: ${{ inputs.limit }}
        run: |
          ARGS=("--slug=$SLUG" "--limit=$LIMIT")
          [ -n "$URL" ] && ARGS+=("--url=$URL")
          [ -n "$IOS" ] && ARGS+=("--ios=$IOS")
          [ -n "$ANDROID" ] && ARGS+=("--android=$ANDROID")
          node scripts/fetch-app-assets.mjs "${ARGS[@]}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: App-Assets für ${{ inputs.slug }} gesammelt"
          branch: assets/${{ inputs.slug }}-${{ github.run_number }}
          delete-branch: true
          title: "App-Assets für ${{ inputs.slug }}"
          body: |
            Automatisch erzeugt über den **Fetch App Assets**-Workflow.

            **Quellen:**
            - Webseite: `${{ inputs.url || '—' }}`
            - iOS App ID: `${{ inputs.ios || '—' }}`
            - Android Package: `${{ inputs.android || '—' }}`
            - Limit pro Quelle: `${{ inputs.limit }}`

            **Nächster Schritt:**
            1. Bilder unter `public/courses/${{ inputs.slug }}/app-assets/` sichten
            2. Unbrauchbares direkt in der GitHub-UI löschen (Datei → Delete)
            3. Julian sagt Claude, welche Bilder wo in `course.json` rein sollen
            4. Claude ergänzt `image`-Elemente + Attribution im Outro
            5. Mergen

            Attribution-Hinweise findest du in `app-assets/manifest.json`.
          labels: |
            assets
            automation
