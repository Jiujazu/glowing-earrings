backend:
  name: github
  repo: Jiujazu/glowing-earrings
  branch: main

media_folder: public/courses
public_folder: /courses

collections:
  - name: courses
    label: Kurse
    folder: content/courses
    extension: json
    format: json
    create: false
    summary: "{{meta.title}} — {{meta.subheading}}"
    fields:

      # ========== TEXTE (das editiert Julian) ==========
      - label: "Kurs-Texte"
        name: meta
        widget: object
        collapsed: false
        fields:
          - { label: "Kurstitel", name: title, widget: string, hint: "Kurz und griffig, z.B. 'Die Karpathy Methode'" }
          - { label: "Untertitel", name: subheading, widget: string, required: false, hint: "Erklärender Zusatz, z.B. 'Persönliche Knowledge Base mit KI'" }
          - { label: "Beschreibung", name: subtitle, widget: text, hint: "1-2 Sätze für die Kurs-Karte" }
          - { label: "Tags", name: tags, widget: list, hint: "Ein Wort pro Tag, z.B. Claude, RAG, Tools" }
          - { label: "Schwierigkeit", name: difficulty, widget: select, options: [{label: Einsteiger, value: beginner}, {label: Fortgeschritten, value: intermediate}, {label: Experte, value: advanced}] }
          - { label: "Dauer (Minuten)", name: estimatedMinutes, widget: number, value_type: int }
          - { label: "Verwandte Kurse", name: relatedCourses, widget: list, required: false, hint: "Slugs anderer Kurse" }
          # Technische Felder (collapsed, selten editiert)
          - { label: Slug, name: slug, widget: string, hint: "Nicht ändern — URL-Pfad des Kurses" }
          - { label: Quell-URL, name: sourceUrl, widget: string }
          - { label: Quell-Autor, name: sourceAuthor, widget: string }
          - { label: Quell-Typ, name: sourceType, widget: string }
          - { label: Kategorie, name: category, widget: string }
          - { label: Veröffentlicht am, name: publishedAt, widget: string }
          - { label: Entwurf, name: draft, widget: boolean, required: false }
          - label: Design
            name: design
            widget: object
            collapsed: true
            fields:
              - { label: Theme, name: theme, widget: string }
              - label: Farben (Dark)
                name: colors
                widget: object
                fields:
                  - { label: Background, name: background, widget: string }
                  - { label: Surface, name: surface, widget: string }
                  - { label: Primary, name: primary, widget: string }
                  - { label: Accent, name: accent, widget: string }
                  - { label: Text, name: text, widget: string }
                  - { label: Text Muted, name: textMuted, widget: string }
              - label: Farben (Light)
                name: lightColors
                widget: object
                required: false
                fields:
                  - { label: Background, name: background, widget: string }
                  - { label: Surface, name: surface, widget: string }
                  - { label: Primary, name: primary, widget: string }
                  - { label: Accent, name: accent, widget: string }
                  - { label: Text, name: text, widget: string }
                  - { label: Text Muted, name: textMuted, widget: string }
              - label: Fonts
                name: fonts
                widget: object
                required: false
                fields:
                  - { label: Heading, name: heading, widget: string, required: false }
                  - { label: Body, name: body, widget: string, required: false }

      # ========== INTRO ==========
      - label: "Kurs-Intro"
        name: intro
        widget: object
        collapsed: false
        fields:
          - { label: "Hook (erster Eindruck)", name: hook, widget: markdown, hint: "Was den Leser sofort packt" }
          - { label: "Quell-Kontext", name: sourceContext, widget: markdown, hint: "Wer ist die Quelle und warum relevant?" }

      # ========== MODULE ==========
      - label: "Module & Inhalte"
        name: modules
        widget: list
        collapsed: true
        label_singular: Modul
        summary: "{{title}}"
        fields:
          - { label: ID, name: id, widget: string }
          - { label: "Modul-Titel", name: title, widget: string }
          - { label: "Dauer (Min)", name: estimatedMinutes, widget: number, value_type: int }
          - { label: "Überleitung zum nächsten Modul", name: transitionToNext, widget: text, required: false }
          - label: Elemente
            name: elements
            widget: list
            collapsed: true
            label_singular: Element
            summary: "{{type}}: {{title}}{{text}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Typ, name: type, widget: select, options: [content, key-concept, callout, context-box, quiz, flashcard, reflection, easter-egg, image, code-block, step-by-step], hint: "Art des Elements" }
              # Fließtext
              - { label: Text, name: text, widget: markdown, required: false }
              # Key-Concept / Callout / Step-by-Step
              - { label: Titel, name: title, widget: string, required: false }
              - { label: Beschreibung, name: description, widget: markdown, required: false }
              - { label: Variante, name: variant, widget: select, options: [quote, stat, example, warning, tip, fun-fact], required: false, hint: "Nur für Callouts" }
              # Quiz
              - { label: Frage, name: question, widget: string, required: false }
              - { label: Erklärung, name: explanation, widget: markdown, required: false }
              - label: Antwort-Optionen
                name: options
                widget: list
                required: false
                label_singular: Option
                fields:
                  - { label: Text, name: text, widget: string }
                  - { label: Richtig?, name: correct, widget: boolean, default: false }
                  - { label: Feedback, name: feedback, widget: text }
              # Flashcard
              - { label: "Vorderseite (Frage)", name: front, widget: text, required: false }
              - { label: "Rückseite (Antwort)", name: back, widget: text, required: false }
              # Reflexion
              - { label: "Reflexionsfrage", name: prompt, widget: text, required: false }
              - { label: Platzhalter, name: placeholder, widget: string, required: false }
              # Easter Egg
              - { label: Trigger, name: trigger, widget: select, options: [click, hover, scroll, konami, idle], required: false }
              - { label: Inhalt, name: content, widget: text, required: false }
              # Bild
              - { label: Bild, name: src, widget: image, required: false }
              - { label: Alt-Text, name: alt, widget: string, required: false }
              - { label: Bildunterschrift, name: caption, widget: string, required: false }
              # Code
              - { label: Code, name: code, widget: text, required: false }
              - { label: Sprache, name: language, widget: string, required: false }
              - { label: Dateiname, name: filename, widget: string, required: false }
              # Context-Box
              - { label: Begriff, name: term, widget: string, required: false }
              # Step-by-Step
              - { label: Highlight-Zeilen, name: highlightLines, widget: list, required: false }
              - label: Schritte
                name: steps
                widget: list
                required: false
                label_singular: Schritt
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Inhalt, name: content, widget: text }

      # ========== OUTRO ==========
      - label: "Kurs-Abschluss"
        name: outro
        widget: object
        collapsed: false
        fields:
          - { label: "Kernerkenntnisse", name: synthesis, widget: list, label_singular: Erkenntnis }
          - { label: "Nächster Schritt", name: nextStep, widget: markdown, hint: "Konkreter Handlungsimpuls" }
          - label: Takeaway-Checkliste
            name: takeaway
            widget: list
            required: false
            label_singular: Punkt
            fields:
              - { label: Emoji, name: emoji, widget: string }
              - { label: Text, name: text, widget: string }
          - { label: Quell-URL, name: sourceUrl, widget: string }
          - { label: Newsletter-CTA, name: newsletterCTA, widget: text }
