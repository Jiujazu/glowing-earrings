backend:
  name: github
  repo: Jiujazu/glowing-earrings
  branch: main

media_folder: public/courses
public_folder: /courses

collections:
  - name: courses
    label: Kurse
    folder: content/courses
    extension: json
    format: json
    create: true
    slug: "{{meta-slug}}"
    summary: "{{meta-title}}"
    fields:
      # ========== META ==========
      - label: Meta
        name: meta
        widget: object
        fields:
          - { label: Slug, name: slug, widget: string, hint: "URL-safe, englisch, kebab-case" }
          - { label: Titel, name: title, widget: string }
          - { label: Subheading, name: subheading, widget: string, required: false }
          - { label: Subtitle (Infotext), name: subtitle, widget: text }
          - { label: Quell-URL, name: sourceUrl, widget: string }
          - { label: Quell-Autor, name: sourceAuthor, widget: string }
          - label: Quell-Typ
            name: sourceType
            widget: select
            options: [tweet, video, article, document, gist, tool, other]
          - label: Kategorie
            name: category
            widget: select
            options:
              - { label: "KI-Technologie & Tools", value: ai-tech }
              - { label: "KI + Kreativität", value: ai-creativity }
              - { label: "KI + Gesellschaft", value: ai-society }
              - { label: "KI-Workflows & Productivity", value: ai-workflows }
          - { label: Tags, name: tags, widget: list, allow_add: true }
          - { label: "Dauer (Minuten)", name: estimatedMinutes, widget: number, value_type: int }
          - label: Schwierigkeit
            name: difficulty
            widget: select
            options:
              - { label: Einsteiger, value: beginner }
              - { label: Fortgeschritten, value: intermediate }
              - { label: Experte, value: advanced }
          - { label: "Veröffentlicht am", name: publishedAt, widget: string, hint: "ISO-Datum, z.B. 2026-04-12" }
          - { label: Entwurf, name: draft, widget: boolean, default: false, required: false }
          - { label: "Verwandte Kurse (Slugs)", name: relatedCourses, widget: list, required: false }
          - label: Design
            name: design
            widget: object
            fields:
              - { label: Theme-Name, name: theme, widget: string }
              - label: Farben (Dark)
                name: colors
                widget: object
                fields:
                  - { label: Background, name: background, widget: string, hint: "Hex, z.B. #0E0B1A" }
                  - { label: Surface, name: surface, widget: string }
                  - { label: Primary, name: primary, widget: string }
                  - { label: Accent, name: accent, widget: string }
                  - { label: Text, name: text, widget: string }
                  - { label: Text Muted, name: textMuted, widget: string }
              - label: Farben (Light)
                name: lightColors
                widget: object
                required: false
                fields:
                  - { label: Background, name: background, widget: string }
                  - { label: Surface, name: surface, widget: string }
                  - { label: Primary, name: primary, widget: string }
                  - { label: Accent, name: accent, widget: string }
                  - { label: Text, name: text, widget: string }
                  - { label: Text Muted, name: textMuted, widget: string }

      # ========== INTRO ==========
      - label: Intro
        name: intro
        widget: object
        fields:
          - { label: Hook, name: hook, widget: text }
          - { label: Quell-Kontext, name: sourceContext, widget: text }

      # ========== MODULES ==========
      - label: Module
        name: modules
        widget: list
        fields:
          - { label: ID, name: id, widget: string }
          - { label: Titel, name: title, widget: string }
          - { label: "Dauer (Minuten)", name: estimatedMinutes, widget: number, value_type: int }
          - { label: "Übergang zum nächsten Modul", name: transitionToNext, widget: text, required: false }
          - label: Elemente
            name: elements
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - label: Typ
                name: type
                widget: select
                options:
                  - content
                  - key-concept
                  - callout
                  - context-box
                  - quiz
                  - flashcard
                  - reflection
                  - easter-egg
                  - image
                  - code-block
                  - step-by-step
              - { label: Text / Code, name: text, widget: text, required: false, hint: "Für content, callout" }
              - { label: Titel / Begriff / Frage, name: title, widget: string, required: false, hint: "Für key-concept, callout, step-by-step, quiz" }
              - { label: Beschreibung / Erklärung, name: description, widget: text, required: false, hint: "Für key-concept, context-box (als explanation)" }
              - { label: Variante, name: variant, widget: select, options: [quote, stat, example, warning, tip, fun-fact], required: false, hint: "Nur für callout" }
              - { label: Frage (Quiz), name: question, widget: string, required: false }
              - { label: Erklärung (Quiz), name: explanation, widget: text, required: false }
              - label: "Optionen (Quiz)"
                name: options
                widget: list
                required: false
                fields:
                  - { label: Text, name: text, widget: string }
                  - { label: Korrekt, name: correct, widget: boolean, default: false }
                  - { label: Feedback, name: feedback, widget: text }
              - { label: Vorderseite (Flashcard), name: front, widget: text, required: false }
              - { label: Rückseite (Flashcard), name: back, widget: text, required: false }
              - { label: Frage (Reflexion), name: prompt, widget: text, required: false }
              - { label: Platzhalter, name: placeholder, widget: string, required: false }
              - { label: Trigger (Easter Egg), name: trigger, widget: select, options: [click, hover, scroll, konami, idle], required: false }
              - { label: Inhalt (Easter Egg), name: content, widget: text, required: false }
              - { label: Bild, name: src, widget: image, required: false }
              - { label: Alt-Text, name: alt, widget: string, required: false }
              - { label: Bildunterschrift, name: caption, widget: string, required: false }
              - { label: Code, name: code, widget: text, required: false }
              - { label: Sprache, name: language, widget: string, required: false }
              - { label: Dateiname, name: filename, widget: string, required: false }
              - { label: "Context-Box Begriff", name: term, widget: string, required: false }
              - { label: "Context-Box Erklärung", name: explanation, widget: text, required: false }
              - label: "Schritte (Step-by-Step)"
                name: steps
                widget: list
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Inhalt, name: content, widget: text }

      # ========== OUTRO ==========
      - label: Outro
        name: outro
        widget: object
        fields:
          - { label: "Synthese (Kernerkenntnisse)", name: synthesis, widget: list }
          - { label: "Nächster Schritt", name: nextStep, widget: text }
          - label: Takeaway-Checkliste
            name: takeaway
            widget: list
            required: false
            fields:
              - { label: Emoji, name: emoji, widget: string }
              - { label: Text, name: text, widget: string }
          - { label: Quell-URL, name: sourceUrl, widget: string }
          - { label: Newsletter-CTA, name: newsletterCTA, widget: text }
