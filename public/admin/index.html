<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin | Glowing Earrings</title>
    <script>window.CMS_MANUAL_INIT = true;</script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      window.initCMS = function() {
        var CMS = window.CMS;
        CMS.init({
          config: {
            load_config_file: false,
            backend: {
              name: "github",
              repo: "Jiujazu/glowing-earrings",
              branch: "main",
              auth_type: "pkce",
              app_id: "Ov23liL3dexsLyJXZxhT"
            },
            media_folder: "public/courses",
            public_folder: "/courses",
            collections: [
              {
                name: "courses",
                label: "Kurse",
                folder: "content/courses",
                extension: "json",
                format: "json",
                create: false,
                fields: [
                  {
                    label: "Meta",
                    name: "meta",
                    widget: "object",
                    fields: [
                      { label: "Slug", name: "slug", widget: "string" },
                      { label: "Titel", name: "title", widget: "string" },
                      { label: "Subheading", name: "subheading", widget: "string", required: false },
                      { label: "Subtitle", name: "subtitle", widget: "text" },
                      { label: "Quell-URL", name: "sourceUrl", widget: "string" },
                      { label: "Quell-Autor", name: "sourceAuthor", widget: "string" },
                      { label: "Quell-Typ", name: "sourceType", widget: "string" },
                      { label: "Kategorie", name: "category", widget: "string" },
                      { label: "Tags", name: "tags", widget: "list" },
                      { label: "Dauer (Min)", name: "estimatedMinutes", widget: "number", value_type: "int" },
                      { label: "Schwierigkeit", name: "difficulty", widget: "string" },
                      { label: "Veröffentlicht am", name: "publishedAt", widget: "string" },
                      { label: "Verwandte Kurse", name: "relatedCourses", widget: "list", required: false },
                      {
                        label: "Design",
                        name: "design",
                        widget: "object",
                        fields: [
                          { label: "Theme", name: "theme", widget: "string" },
                          {
                            label: "Farben (Dark)",
                            name: "colors",
                            widget: "object",
                            fields: [
                              { label: "Background", name: "background", widget: "color" },
                              { label: "Surface", name: "surface", widget: "color" },
                              { label: "Primary", name: "primary", widget: "color" },
                              { label: "Accent", name: "accent", widget: "color" },
                              { label: "Text", name: "textColor", widget: "color" },
                              { label: "Text Muted", name: "textMuted", widget: "color" }
                            ]
                          }
                        ]
                      }
                    ]
                  },
                  {
                    label: "Intro",
                    name: "intro",
                    widget: "object",
                    fields: [
                      { label: "Hook", name: "hook", widget: "text" },
                      { label: "Quell-Kontext", name: "sourceContext", widget: "text" }
                    ]
                  },
                  {
                    label: "Module (JSON)",
                    name: "modules",
                    widget: "code",
                    default_language: "json",
                    output_code_only: true
                  },
                  {
                    label: "Outro",
                    name: "outro",
                    widget: "object",
                    fields: [
                      { label: "Synthese", name: "synthesis", widget: "list" },
                      { label: "Nächster Schritt", name: "nextStep", widget: "text" },
                      { label: "Quell-URL", name: "sourceUrl", widget: "string" },
                      { label: "Newsletter-CTA", name: "newsletterCTA", widget: "text" }
                    ]
                  }
                ]
              }
            ]
          }
        });
      };

      // Wait for CMS to be ready
      if (document.readyState === "complete") {
        window.initCMS();
      } else {
        window.addEventListener("load", window.initCMS);
      }
    </script>
  </body>
</html>
