<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C0F1A"/>
      <stop offset="100%" stop-color="#141830"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>
  <!-- 7 ascending level bars -->
  <rect x="100" y="310" width="70" height="40" rx="6" fill="#D4A843" opacity="0.25"/>
  <rect x="190" y="270" width="70" height="80" rx="6" fill="#D4A843" opacity="0.35"/>
  <rect x="280" y="230" width="70" height="120" rx="6" fill="#D4A843" opacity="0.45"/>
  <rect x="370" y="190" width="70" height="160" rx="6" fill="#D4A843" opacity="0.55"/>
  <rect x="460" y="150" width="70" height="200" rx="6" fill="#D4A843" opacity="0.65"/>
  <rect x="550" y="110" width="70" height="240" rx="6" fill="#D4A843" opacity="0.78"/>
  <rect x="640" y="70" width="70" height="280" rx="6" fill="#D4A843" opacity="0.9"/>
  <!-- Level numbers -->
  <text x="135" y="340" font-family="system-ui" font-size="18" font-weight="700" fill="#0C0F1A" text-anchor="middle" opacity="0.8">1</text>
  <text x="225" y="340" font-family="system-ui" font-size="18" font-weight="700" fill="#0C0F1A" text-anchor="middle" opacity="0.8">2</text>
  <text x="315" y="340" font-family="system-ui" font-size="18" font-weight="700" fill="#0C0F1A" text-anchor="middle" opacity="0.8">3</text>
  <text x="405" y="340" font-family="system-ui" font-size="18" font-weight="700" fill="#0C0F1A" text-anchor="middle" opacity="0.8">4</text>
  <text x="495" y="340" font-family="system-ui" font-size="18" font-weight="700" fill="#0C0F1A" text-anchor="middle" opacity="0.8">5</text>
  <text x="585" y="340" font-family="system-ui" font-size="18" font-weight="700" fill="#0C0F1A" text-anchor="middle" opacity="0.8">6</text>
  <text x="675" y="340" font-family="system-ui" font-size="18" font-weight="700" fill="#0C0F1A" text-anchor="middle" opacity="0.8">7</text>
  <!-- Connection arrows between levels -->
  <path d="M170 320 L190 300" stroke="#4A90D9" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M260 280 L280 260" stroke="#4A90D9" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M350 240 L370 220" stroke="#4A90D9" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M440 200 L460 180" stroke="#4A90D9" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M530 160 L550 140" stroke="#4A90D9" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M620 120 L640 100" stroke="#4A90D9" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Top glow accent -->
  <ellipse cx="675" cy="70" rx="80" ry="60" fill="#D4A843" opacity="0.08"/>
  <ellipse cx="400" cy="350" rx="300" ry="80" fill="#4A90D9" opacity="0.06"/>
</svg>
