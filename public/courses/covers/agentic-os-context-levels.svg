<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FAFAFA"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="#000" stroke-width="0.5" opacity="0.06"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#000" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Border -->
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#000" stroke-width="4"/>
  <!-- 7 ascending level bars — sharp, no radius -->
  <rect x="80" y="300" width="70" height="50" fill="#F59E0B" stroke="#000" stroke-width="4" opacity="0.4"/>
  <rect x="170" y="260" width="70" height="90" fill="#F59E0B" stroke="#000" stroke-width="4" opacity="0.5"/>
  <rect x="260" y="220" width="70" height="130" fill="#F59E0B" stroke="#000" stroke-width="4" opacity="0.6"/>
  <rect x="350" y="175" width="70" height="175" fill="#F59E0B" stroke="#000" stroke-width="4" opacity="0.7"/>
  <rect x="440" y="130" width="70" height="220" fill="#F59E0B" stroke="#000" stroke-width="4" opacity="0.8"/>
  <rect x="530" y="85" width="70" height="265" fill="#F59E0B" stroke="#000" stroke-width="4" opacity="0.9"/>
  <rect x="620" y="40" width="70" height="310" fill="#F59E0B" stroke="#000" stroke-width="4"/>
  <!-- Level numbers — bold black -->
  <text x="115" y="340" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#000" text-anchor="middle">1</text>
  <text x="205" y="340" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#000" text-anchor="middle">2</text>
  <text x="295" y="340" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#000" text-anchor="middle">3</text>
  <text x="385" y="340" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#000" text-anchor="middle">4</text>
  <text x="475" y="340" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#000" text-anchor="middle">5</text>
  <text x="565" y="340" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#000" text-anchor="middle">6</text>
  <text x="655" y="340" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#000" text-anchor="middle">7</text>
  <!-- Arrows between levels -->
  <polygon points="155,290 165,280 165,300" fill="#000"/>
  <polygon points="245,250 255,240 255,260" fill="#000"/>
  <polygon points="335,210 345,200 345,220" fill="#000"/>
  <polygon points="425,165 435,155 435,175" fill="#000"/>
  <polygon points="515,120 525,110 525,130" fill="#000"/>
  <polygon points="605,75 615,65 615,85" fill="#000"/>
  <!-- "CONTEXT" sticker label -->
  <rect x="50" y="30" width="200" height="48" fill="#3B82F6" stroke="#000" stroke-width="4" transform="rotate(-2 150 54)"/>
  <text x="150" y="62" font-family="system-ui, sans-serif" font-size="22" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="4" transform="rotate(-2 150 54)">CONTEXT</text>
  <!-- Decorative square -->
  <rect x="730" y="20" width="30" height="30" fill="#E91E8C" stroke="#000" stroke-width="3" transform="rotate(12 745 35)"/>
</svg>
