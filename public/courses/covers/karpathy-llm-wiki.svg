<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0B1A"/>
      <stop offset="100%" stop-color="#1A1530"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B4FBF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00C9A7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Knowledge graph nodes -->
  <circle cx="200" cy="160" r="35" fill="none" stroke="#7B4FBF" stroke-width="2" opacity="0.8"/>
  <circle cx="350" cy="100" r="25" fill="none" stroke="#00C9A7" stroke-width="2" opacity="0.7"/>
  <circle cx="500" cy="180" r="40" fill="none" stroke="#7B4FBF" stroke-width="2" opacity="0.6"/>
  <circle cx="620" cy="120" r="20" fill="none" stroke="#00C9A7" stroke-width="2" opacity="0.8"/>
  <circle cx="300" cy="280" r="30" fill="none" stroke="#7B4FBF" stroke-width="2" opacity="0.5"/>
  <circle cx="480" cy="300" r="22" fill="none" stroke="#00C9A7" stroke-width="2" opacity="0.7"/>
  <circle cx="650" cy="260" r="28" fill="none" stroke="#7B4FBF" stroke-width="2" opacity="0.6"/>
  <circle cx="130" cy="300" r="18" fill="none" stroke="#00C9A7" stroke-width="2" opacity="0.5"/>
  <!-- Connections -->
  <line x1="230" y1="145" x2="330" y2="110" stroke="#7B4FBF" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="115" x2="465" y2="165" stroke="#00C9A7" stroke-width="1" opacity="0.3"/>
  <line x1="535" y1="165" x2="605" y2="130" stroke="#7B4FBF" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="190" x2="275" y2="260" stroke="#00C9A7" stroke-width="1" opacity="0.25"/>
  <line x1="325" y1="270" x2="460" y2="295" stroke="#7B4FBF" stroke-width="1" opacity="0.25"/>
  <line x1="500" y1="290" x2="625" y2="265" stroke="#00C9A7" stroke-width="1" opacity="0.25"/>
  <line x1="490" y1="215" x2="475" y2="280" stroke="#7B4FBF" stroke-width="1" opacity="0.2"/>
  <line x1="145" y1="290" x2="200" y2="190" stroke="#00C9A7" stroke-width="1" opacity="0.2"/>
  <!-- Node highlights -->
  <circle cx="200" cy="160" r="6" fill="#7B4FBF" opacity="0.9"/>
  <circle cx="350" cy="100" r="5" fill="#00C9A7" opacity="0.9"/>
  <circle cx="500" cy="180" r="7" fill="#7B4FBF" opacity="0.9"/>
  <circle cx="620" cy="120" r="4" fill="#00C9A7" opacity="0.9"/>
  <circle cx="300" cy="280" r="5" fill="#7B4FBF" opacity="0.8"/>
  <circle cx="480" cy="300" r="4" fill="#00C9A7" opacity="0.8"/>
  <!-- Ambient glow -->
  <ellipse cx="400" cy="200" rx="250" ry="130" fill="url(#glow)" opacity="0.15"/>
</svg>
