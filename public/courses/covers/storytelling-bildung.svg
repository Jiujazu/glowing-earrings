<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FAFAFA"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid4" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="#000" stroke-width="0.5" opacity="0.05"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#000" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid4)"/>
  <!-- Border -->
  <!-- Story arc — thick, angular path -->
  <polyline points="80,310 180,280 280,200 380,100 440,55 500,80 560,140 640,220 720,300"
        stroke="#000" stroke-width="5" fill="none" stroke-linejoin="miter"/>
  <!-- Arc milestone squares -->
  <rect x="70" y="300" width="20" height="20" fill="#E8A838" stroke="#000" stroke-width="3"/>
  <rect x="270" y="190" width="20" height="20" fill="#E8A838" stroke="#000" stroke-width="3"/>
  <rect x="430" y="45" width="24" height="24" fill="#FF6B6B" stroke="#000" stroke-width="4"/>
  <rect x="550" y="130" width="20" height="20" fill="#E8A838" stroke="#000" stroke-width="3"/>
  <rect x="710" y="290" width="20" height="20" fill="#E8A838" stroke="#000" stroke-width="3"/>
  <!-- Milestone label stickers -->
  <rect x="45" y="330" width="70" height="30" fill="#E8A838" stroke="#000" stroke-width="3"/>
  <text x="80" y="351" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#000" text-anchor="middle">HOOK</text>
  <rect x="245" y="220" width="70" height="30" fill="#E8A838" stroke="#000" stroke-width="3"/>
  <text x="280" y="241" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#000" text-anchor="middle">BUILD</text>
  <rect x="400" y="10" width="100" height="35" fill="#FF6B6B" stroke="#000" stroke-width="4" transform="rotate(-3 450 28)"/>
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#FFF" text-anchor="middle" transform="rotate(-3 450 35)">CLIMAX</text>
  <rect x="525" y="160" width="70" height="30" fill="#E8A838" stroke="#000" stroke-width="3"/>
  <text x="560" y="181" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#000" text-anchor="middle">TWIST</text>
  <rect x="685" y="320" width="80" height="30" fill="#E8A838" stroke="#000" stroke-width="3"/>
  <text x="725" y="341" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#000" text-anchor="middle">PAYOFF</text>
  <!-- Decorative elements -->
  <rect x="140" y="50" width="25" height="25" fill="#E91E8C" stroke="#000" stroke-width="3" transform="rotate(15 152 62)"/>
  <polygon points="680,60 688,80 710,80 692,92 698,114 680,100 662,114 668,92 650,80 672,80" fill="#000" stroke="#000" stroke-width="2"/>
  <!-- Vertical dotted guide lines — thick dashes -->
  <line x1="80" y1="320" x2="80" y2="360" stroke="#000" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="442" y1="69" x2="442" y2="360" stroke="#000" stroke-width="2" stroke-dasharray="6,4" opacity="0.2"/>
  <line x1="720" y1="310" x2="720" y2="360" stroke="#000" stroke-width="2" stroke-dasharray="6,4"/>
</svg>
