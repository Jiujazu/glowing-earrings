<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0E17"/>
      <stop offset="100%" stop-color="#1A1926"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg4)"/>
  <!-- Story arc curve -->
  <path d="M80 320 C150 310, 200 280, 280 200 C340 140, 380 80, 440 60 C500 40, 540 60, 560 100 C600 180, 640 240, 720 300"
        stroke="#E8A838" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
  <!-- Arc milestones -->
  <circle cx="140" cy="300" r="8" fill="#E8A838" opacity="0.5"/>
  <circle cx="280" cy="200" r="8" fill="#E8A838" opacity="0.65"/>
  <circle cx="440" cy="60" r="10" fill="#E8A838" opacity="0.9"/>
  <circle cx="560" cy="100" r="8" fill="#E8A838" opacity="0.7"/>
  <circle cx="700" cy="300" r="8" fill="#E8A838" opacity="0.5"/>
  <!-- Milestone labels -->
  <text x="140" y="335" font-family="system-ui" font-size="11" fill="#E8A838" text-anchor="middle" opacity="0.5">Hook</text>
  <text x="280" y="225" font-family="system-ui" font-size="11" fill="#E8A838" text-anchor="middle" opacity="0.5">Build</text>
  <text x="440" y="45" font-family="system-ui" font-size="12" fill="#E8A838" text-anchor="middle" opacity="0.7" font-weight="600">Climax</text>
  <text x="560" y="85" font-family="system-ui" font-size="11" fill="#E8A838" text-anchor="middle" opacity="0.5">Twist</text>
  <text x="700" y="335" font-family="system-ui" font-size="11" fill="#E8A838" text-anchor="middle" opacity="0.5">Payoff</text>
  <!-- Decorative story elements -->
  <rect x="90" y="340" width="100" height="2" rx="1" fill="#E8A838" opacity="0.15"/>
  <rect x="350" y="340" width="120" height="2" rx="1" fill="#E8A838" opacity="0.15"/>
  <rect x="620" y="340" width="90" height="2" rx="1" fill="#E8A838" opacity="0.15"/>
  <!-- Connecting dotted verticals -->
  <line x1="140" y1="308" x2="140" y2="340" stroke="#E8A838" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="440" y1="70" x2="440" y2="340" stroke="#E8A838" stroke-width="1" stroke-dasharray="3,3" opacity="0.15"/>
  <line x1="700" y1="308" x2="700" y2="340" stroke="#E8A838" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <!-- Ambient glow at climax -->
  <ellipse cx="440" cy="60" rx="120" ry="80" fill="#E8A838" opacity="0.06"/>
  <!-- Subtle coral accent -->
  <circle cx="440" cy="60" r="16" fill="none" stroke="#E07A5F" stroke-width="1.5" opacity="0.3"/>
</svg>
