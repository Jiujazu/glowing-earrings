<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FAFAFA"/>
  <!-- Halftone pattern (matches Karpathy 1 family) -->
  <defs>
    <pattern id="dotsv2" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.2" fill="#000" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#dotsv2)"/>

  <!-- ===== Satellite knowledge graph nodes ===== -->
  <rect x="55" y="100" width="75" height="75" fill="#14B8A6" stroke="#000" stroke-width="4"/>
  <rect x="65" y="245" width="65" height="65" fill="#8B5CF6" stroke="#000" stroke-width="4"/>
  <rect x="660" y="100" width="75" height="75" fill="#14B8A6" stroke="#000" stroke-width="4"/>
  <rect x="670" y="245" width="65" height="65" fill="#8B5CF6" stroke="#000" stroke-width="4"/>

  <!-- Confidence scores INSIDE nodes — readable at thumbnail size -->
  <text x="92" y="146" font-family="monospace" font-size="20" font-weight="900" fill="#FFF" text-anchor="middle">0.92</text>
  <text x="97" y="284" font-family="monospace" font-size="18" font-weight="900" fill="#FFF" text-anchor="middle">0.67</text>
  <text x="697" y="146" font-family="monospace" font-size="20" font-weight="900" fill="#FFF" text-anchor="middle">0.85</text>
  <text x="702" y="284" font-family="monospace" font-size="18" font-weight="900" fill="#FFF" text-anchor="middle">0.41</text>

  <!-- ===== Typed edges from satellites to central tier stack ===== -->
  <line x1="130" y1="135" x2="280" y2="200" stroke="#000" stroke-width="3"/>
  <line x1="130" y1="275" x2="280" y2="280" stroke="#000" stroke-width="3"/>
  <line x1="510" y1="200" x2="660" y2="135" stroke="#000" stroke-width="3"/>
  <line x1="510" y1="280" x2="670" y2="275" stroke="#000" stroke-width="3"/>

  <!-- Edge type labels with FAFAFA background plate for legibility -->
  <rect x="160" y="148" width="50" height="18" fill="#FAFAFA" stroke="none"/>
  <text x="185" y="161" font-family="monospace" font-size="12" font-weight="700" fill="#7B4FBF" text-anchor="middle">uses</text>

  <rect x="155" y="284" width="90" height="18" fill="#FAFAFA" stroke="none"/>
  <text x="200" y="297" font-family="monospace" font-size="12" font-weight="700" fill="#E91E8C" text-anchor="middle">contradicts</text>

  <rect x="555" y="148" width="90" height="18" fill="#FAFAFA" stroke="none"/>
  <text x="600" y="161" font-family="monospace" font-size="12" font-weight="700" fill="#7B4FBF" text-anchor="middle">depends-on</text>

  <rect x="555" y="284" width="90" height="18" fill="#FAFAFA" stroke="none"/>
  <text x="600" y="297" font-family="monospace" font-size="12" font-weight="700" fill="#14B8A6" text-anchor="middle">supersedes</text>

  <!-- ===== Central CONSOLIDATION TIERS — the lifecycle, ascending ===== -->
  <rect x="280" y="270" width="230" height="40" fill="#14B8A6" stroke="#000" stroke-width="4"/>
  <text x="395" y="296" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="3">WORKING</text>

  <rect x="280" y="230" width="230" height="40" fill="#8B5CF6" stroke="#000" stroke-width="4"/>
  <text x="395" y="256" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="3">EPISODIC</text>

  <rect x="280" y="190" width="230" height="40" fill="#7C3AED" stroke="#000" stroke-width="4"/>
  <text x="395" y="216" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="3">SEMANTIC</text>

  <rect x="280" y="150" width="230" height="40" fill="#E91E8C" stroke="#000" stroke-width="4"/>
  <text x="395" y="176" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="3">PROCEDURAL</text>

  <!-- Big PROMOTE arrow on right side of stack — the lifecycle direction -->
  <line x1="540" y1="295" x2="540" y2="180" stroke="#000" stroke-width="4"/>
  <polygon points="540,150 524,180 556,180" fill="#000"/>
  <rect x="552" y="215" width="60" height="22" fill="#0B0A1A" stroke="#000" stroke-width="3"/>
  <text x="582" y="231" font-family="system-ui, sans-serif" font-size="11" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="2">PROMOTE</text>

  <!-- ===== "LIVING" main sticker — top center, the conceptual hook ===== -->
  <rect x="315" y="40" width="170" height="50" fill="#0B0A1A" stroke="#000" stroke-width="4" transform="rotate(-3 400 65)"/>
  <text x="400" y="74" font-family="system-ui, sans-serif" font-size="26" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="6" transform="rotate(-3 400 65)">LIVING</text>

  <!-- ===== "v2" series badge — top-right corner ===== -->
  <rect x="710" y="22" width="60" height="36" fill="#E91E8C" stroke="#000" stroke-width="3" transform="rotate(6 740 40)"/>
  <text x="740" y="48" font-family="system-ui, sans-serif" font-size="20" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="2" transform="rotate(6 740 40)">v2</text>

  <!-- ===== Decorative elements ===== -->
  <rect x="20" y="40" width="28" height="28" fill="#E91E8C" stroke="#000" stroke-width="3" transform="rotate(15 34 54)"/>
  <polygon points="50,360 56,372 70,372 59,381 63,394 50,386 37,394 41,381 30,372 44,372" fill="#000"/>
  <polygon points="755,355 761,367 775,367 764,376 768,389 755,381 742,389 746,376 735,367 749,367" fill="#000"/>
</svg>
