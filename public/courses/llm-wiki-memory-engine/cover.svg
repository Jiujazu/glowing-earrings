<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FAFAFA"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Central brain/memory node -->
  <rect x="310" y="120" width="180" height="160" fill="#8B5CF6" stroke="#000" stroke-width="4"/>

  <!-- Satellite nodes — entities in the graph -->
  <rect x="80" y="60" width="65" height="65" fill="#14B8A6" stroke="#000" stroke-width="3"/>
  <rect x="80" y="260" width="55" height="55" fill="#14B8A6" stroke="#000" stroke-width="3"/>
  <rect x="640" y="70" width="70" height="70" fill="#14B8A6" stroke="#000" stroke-width="3"/>
  <rect x="650" y="260" width="60" height="60" fill="#8B5CF6" stroke="#000" stroke-width="3"/>

  <!-- Typed relationship lines -->
  <line x1="145" y1="92" x2="310" y2="160" stroke="#000" stroke-width="3"/>
  <line x1="135" y1="287" x2="310" y2="240" stroke="#000" stroke-width="3"/>
  <line x1="490" y1="160" x2="640" y2="105" stroke="#000" stroke-width="3"/>
  <line x1="490" y1="240" x2="650" y2="290" stroke="#000" stroke-width="3"/>

  <!-- Circular arrows on central node — lifecycle symbol -->
  <path d="M 370 130 A 30 30 0 0 1 430 130" fill="none" stroke="#FFF" stroke-width="3"/>
  <polygon points="430,130 422,118 422,142" fill="#FFF"/>
  <path d="M 430 270 A 30 30 0 0 1 370 270" fill="none" stroke="#FFF" stroke-width="3"/>
  <polygon points="370,270 378,258 378,282" fill="#FFF"/>

  <!-- "v2" sticker label — rotated -->
  <rect x="520" y="165" width="90" height="45" fill="#E91E8C" stroke="#000" stroke-width="4" transform="rotate(-2 565 187)"/>
  <text x="565" y="195" font-family="system-ui, sans-serif" font-size="26" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="3" transform="rotate(-2 565 187)">v2</text>

  <!-- Confidence score labels on nodes -->
  <text x="112" y="107" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#000" text-anchor="middle">0.92</text>
  <text x="107" y="298" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#000" text-anchor="middle">0.67</text>
  <text x="675" y="123" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#000" text-anchor="middle">0.85</text>
  <text x="680" y="303" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#000" text-anchor="middle">0.41</text>

  <!-- Relationship type labels on lines -->
  <text x="210" y="110" font-family="monospace" font-size="10" font-weight="700" fill="#8B5CF6" transform="rotate(-15 210 110)">uses</text>
  <text x="200" y="268" font-family="monospace" font-size="10" font-weight="700" fill="#E91E8C" transform="rotate(12 200 268)">contradicts</text>
  <text x="570" y="138" font-family="monospace" font-size="10" font-weight="700" fill="#8B5CF6" transform="rotate(-12 570 138)">depends-on</text>
  <text x="575" y="272" font-family="monospace" font-size="10" font-weight="700" fill="#14B8A6" transform="rotate(15 575 272)">supersedes</text>

  <!-- Decorative pink square — rotated -->
  <rect x="30" y="170" width="25" height="25" fill="#E91E8C" stroke="#000" stroke-width="3" transform="rotate(15 42 182)"/>

  <!-- Decorative small accent squares -->
  <rect x="740" y="180" width="20" height="20" fill="#8B5CF6" stroke="#000" stroke-width="3" transform="rotate(-10 750 190)"/>
  <rect x="550" y="330" width="18" height="18" fill="#14B8A6" stroke="#000" stroke-width="3" transform="rotate(8 559 339)"/>

  <!-- Decorative star -->
  <polygon points="720,350 726,365 742,365 729,374 734,390 720,380 706,390 711,374 698,365 714,365" fill="#000"/>

  <!-- Small decorative star -->
  <polygon points="170,170 174,180 185,180 176,186 179,197 170,190 161,197 164,186 155,180 166,180" fill="#000"/>
</svg>
