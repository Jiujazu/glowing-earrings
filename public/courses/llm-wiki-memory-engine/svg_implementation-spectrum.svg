<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FAFAFA"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- 6 ascending bars -->
  <!-- Bar 1: Minimal Viable Wiki -->
  <rect x="55" y="310" width="95" height="60" fill="#14B8A6" stroke="#000" stroke-width="3"/>
  <text x="102" y="338" font-family="system-ui, sans-serif" font-size="10" font-weight="900" fill="#FFF" text-anchor="middle">MINIMAL</text>
  <text x="102" y="352" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">Wiki + Index</text>

  <!-- Bar 2: + Lifecycle -->
  <rect x="170" y="260" width="95" height="110" fill="#14B8A6" stroke="#000" stroke-width="3"/>
  <text x="217" y="305" font-family="system-ui, sans-serif" font-size="10" font-weight="900" fill="#FFF" text-anchor="middle">LIFECYCLE</text>
  <text x="217" y="319" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">Confidence</text>
  <text x="217" y="332" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">+ Decay</text>

  <!-- Bar 3: + Structure -->
  <rect x="285" y="205" width="95" height="165" fill="#8B5CF6" stroke="#000" stroke-width="3"/>
  <text x="332" y="278" font-family="system-ui, sans-serif" font-size="10" font-weight="900" fill="#FFF" text-anchor="middle">STRUKTUR</text>
  <text x="332" y="292" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">Knowledge</text>
  <text x="332" y="305" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">Graph</text>

  <!-- Bar 4: + Automation -->
  <rect x="400" y="150" width="95" height="220" fill="#8B5CF6" stroke="#000" stroke-width="3"/>
  <text x="447" y="250" font-family="system-ui, sans-serif" font-size="10" font-weight="900" fill="#FFF" text-anchor="middle">AUTOMATION</text>
  <text x="447" y="264" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">Event-Hooks</text>

  <!-- Bar 5: + Scale -->
  <rect x="515" y="95" width="95" height="275" fill="#8B5CF6" stroke="#000" stroke-width="3"/>
  <text x="562" y="222" font-family="system-ui, sans-serif" font-size="10" font-weight="900" fill="#FFF" text-anchor="middle">SCALE</text>
  <text x="562" y="236" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">Hybrid Search</text>
  <text x="562" y="249" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">+ Quality</text>

  <!-- Bar 6: + Collaboration -->
  <rect x="630" y="40" width="110" height="330" fill="#E91E8C" stroke="#000" stroke-width="4"/>
  <text x="685" y="195" font-family="system-ui, sans-serif" font-size="11" font-weight="900" fill="#FFF" text-anchor="middle">COLLAB</text>
  <text x="685" y="212" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">Mesh Sync</text>
  <text x="685" y="225" font-family="system-ui, sans-serif" font-size="9" fill="#FFF" text-anchor="middle" opacity="0.8">+ Governance</text>

  <!-- Stage numbers -->
  <text x="102" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#000" text-anchor="middle">1</text>
  <text x="217" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#000" text-anchor="middle">2</text>
  <text x="332" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#000" text-anchor="middle">3</text>
  <text x="447" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#000" text-anchor="middle">4</text>
  <text x="562" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#000" text-anchor="middle">5</text>
  <text x="685" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#000" text-anchor="middle">6</text>

  <!-- "PICK YOUR ENTRY" sticker -->
  <rect x="60" y="20" width="200" height="40" fill="#8B5CF6" stroke="#000" stroke-width="3" transform="rotate(-2 160 40)"/>
  <text x="160" y="47" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="2" transform="rotate(-2 160 40)">PICK YOUR ENTRY</text>

  <!-- Decorative elements -->
  <polygon points="770,380 775,390 785,390 777,396 779,406 770,400 761,406 763,396 755,390 765,390" fill="#000"/>
  <rect x="25" y="250" width="18" height="18" fill="#E91E8C" stroke="#000" stroke-width="3" transform="rotate(20 34 259)"/>
</svg>
