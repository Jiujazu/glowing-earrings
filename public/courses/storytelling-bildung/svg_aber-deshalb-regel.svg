<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#FAFAFA"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid-adr" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="#000" stroke-width="0.5" opacity="0.05"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#000" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="800" height="380" fill="url(#grid-adr)"/>

  <!-- === TOP ROW: UND DANN (bad) === -->
  <!-- Scene boxes -->
  <rect x="40" y="50" width="130" height="65" fill="#FFF" stroke="#000" stroke-width="3"/>
  <text x="105" y="88" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#000" text-anchor="middle">Szene 1</text>
  <!-- UND DANN connector 1 -->
  <rect x="195" y="62" width="110" height="38" fill="#FFF" stroke="#000" stroke-width="2" opacity="0.6"/>
  <text x="250" y="87" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#000" text-anchor="middle" opacity="0.5">und dann</text>
  <!-- Strike-through -->
  <line x1="195" y1="82" x2="305" y2="82" stroke="#FF6B6B" stroke-width="4" stroke-linecap="round"/>
  <!-- Scene 2 -->
  <rect x="330" y="50" width="130" height="65" fill="#FFF" stroke="#000" stroke-width="3"/>
  <text x="395" y="88" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#000" text-anchor="middle">Szene 2</text>
  <!-- UND DANN connector 2 -->
  <rect x="485" y="62" width="110" height="38" fill="#FFF" stroke="#000" stroke-width="2" opacity="0.6"/>
  <text x="540" y="87" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#000" text-anchor="middle" opacity="0.5">und dann</text>
  <!-- Strike-through -->
  <line x1="485" y1="82" x2="595" y2="82" stroke="#FF6B6B" stroke-width="4" stroke-linecap="round"/>
  <!-- Scene 3 -->
  <rect x="620" y="50" width="130" height="65" fill="#FFF" stroke="#000" stroke-width="3"/>
  <text x="685" y="88" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#000" text-anchor="middle">Szene 3</text>
  <!-- Big X over entire top row -->
  <line x1="30" y1="40" x2="760" y2="125" stroke="#FF6B6B" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <line x1="30" y1="125" x2="760" y2="40" stroke="#FF6B6B" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

  <!-- Divider -->
  <line x1="60" y1="155" x2="740" y2="155" stroke="#000" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.15"/>

  <!-- === BOTTOM ROW: ABER / DESHALB (good) === -->
  <!-- Scene boxes — bolder -->
  <rect x="40" y="195" width="130" height="65" fill="#FFF" stroke="#000" stroke-width="4"/>
  <text x="105" y="233" font-family="system-ui, sans-serif" font-size="13" font-weight="900" fill="#000" text-anchor="middle">Szene 1</text>
  <!-- ABER connector sticker -->
  <rect x="197" y="205" width="106" height="42" fill="#E8A838" stroke="#000" stroke-width="3" transform="rotate(-2 250 226)"/>
  <text x="250" y="233" font-family="system-ui, sans-serif" font-size="20" font-weight="900" fill="#000" text-anchor="middle" transform="rotate(-2 250 233)">ABER</text>
  <!-- Arrow -->
  <line x1="185" y1="228" x2="192" y2="228" stroke="#000" stroke-width="3"/>
  <line x1="308" y1="228" x2="325" y2="228" stroke="#000" stroke-width="3"/>
  <polygon points="330,228 320,220 320,236" fill="#000"/>
  <!-- Scene 2 -->
  <rect x="330" y="195" width="130" height="65" fill="#FFF" stroke="#000" stroke-width="4"/>
  <text x="395" y="233" font-family="system-ui, sans-serif" font-size="13" font-weight="900" fill="#000" text-anchor="middle">Szene 2</text>
  <!-- DESHALB connector sticker -->
  <rect x="480" y="205" width="130" height="42" fill="#E8A838" stroke="#000" stroke-width="3" transform="rotate(2 545 226)"/>
  <text x="545" y="233" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#000" text-anchor="middle" transform="rotate(2 545 233)">DESHALB</text>
  <!-- Arrow -->
  <line x1="470" y1="228" x2="477" y2="228" stroke="#000" stroke-width="3"/>
  <line x1="613" y1="228" x2="625" y2="228" stroke="#000" stroke-width="3"/>
  <polygon points="630,228 620,220 620,236" fill="#000"/>
  <!-- Scene 3 -->
  <rect x="630" y="195" width="130" height="65" fill="#FFF" stroke="#000" stroke-width="4"/>
  <text x="695" y="233" font-family="system-ui, sans-serif" font-size="13" font-weight="900" fill="#000" text-anchor="middle">Szene 3</text>

  <!-- Bottom attribution sticker -->
  <rect x="210" y="310" width="380" height="42" fill="#FF6B6B" stroke="#000" stroke-width="4" transform="rotate(-1 400 331)"/>
  <text x="400" y="338" font-family="system-ui, sans-serif" font-size="15" font-weight="900" fill="#FFF" text-anchor="middle" transform="rotate(-1 400 338)">DIE ABER-DESHALB-REGEL</text>

  <!-- Decorative tilted square -->
  <rect x="18" y="15" width="20" height="20" fill="#E91E8C" stroke="#000" stroke-width="3" transform="rotate(12 28 25)"/>
  <!-- Decorative star -->
  <polygon points="775,350 780,362 794,362 783,370 787,382 775,374 763,382 767,370 756,362 770,362" fill="#000"/>
  <!-- Decorative square bottom-left -->
  <rect x="15" y="350" width="16" height="16" fill="#E8A838" stroke="#000" stroke-width="2" transform="rotate(-8 23 358)"/>
</svg>
