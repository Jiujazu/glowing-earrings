<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="16" fill="#1A1926"/>
  <!-- Left: Abfolge (separate chain links) -->
  <text x="200" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#A7A9BE" letter-spacing="0.05em">ABFOLGE</text>
  <ellipse cx="120" cy="120" rx="40" ry="30" fill="none" stroke="#FFFFFE" stroke-width="3" opacity="0.6"/>
  <ellipse cx="200" cy="120" rx="40" ry="30" fill="none" stroke="#FFFFFE" stroke-width="3" opacity="0.6"/>
  <ellipse cx="280" cy="120" rx="40" ry="30" fill="none" stroke="#FFFFFE" stroke-width="3" opacity="0.6"/>
  <text x="120" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#A7A9BE">Info 1</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#A7A9BE">Info 2</text>
  <text x="280" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#A7A9BE">Info 3</text>
  <text x="200" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#FFFFFE">Abfolge</text>
  <text x="200" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#A7A9BE">Einzelne Fakten, unverbunden</text>
  <!-- Divider -->
  <line x1="400" y1="30" x2="400" y2="300" stroke="#A7A9BE" stroke-width="1" opacity="0.3"/>
  <!-- Arrow -->
  <text x="400" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" fill="#E8A838">→</text>
  <!-- Right: Verknuepfung (interlocked chain links) -->
  <text x="600" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#E8A838" letter-spacing="0.05em">VERKNUEPFUNG</text>
  <!-- Interlocked ovals -->
  <ellipse cx="530" cy="120" rx="42" ry="30" fill="none" stroke="#E8A838" stroke-width="3"/>
  <rect x="555" y="88" width="18" height="64" fill="#1A1926"/>
  <ellipse cx="600" cy="120" rx="42" ry="30" fill="none" stroke="#E8A838" stroke-width="3"/>
  <rect x="625" y="88" width="18" height="64" fill="#1A1926"/>
  <ellipse cx="670" cy="120" rx="42" ry="30" fill="none" stroke="#E8A838" stroke-width="3"/>
  <!-- Glow effect -->
  <ellipse cx="600" cy="120" rx="100" ry="50" fill="none" stroke="#E8A838" stroke-width="1" opacity="0.15"/>
  <text x="600" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#E8A838">Geschichte</text>
  <text x="600" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#A7A9BE">Emotional verknuepft, im Kontext</text>
  <!-- Bottom label -->
  <text x="400" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#FF6B6B">Gleiche Fakten. Komplett anderes Erlebnis.</text>
</svg>
