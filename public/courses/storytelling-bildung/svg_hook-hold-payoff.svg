  <text x="160" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#E8A838">Hook</text>
  <text x="160" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#A7A9BE">Einfangen</text>
  <!-- Hold -->
  <rect x="300" y="70" width="200" height="200" rx="16" fill="#1A1926" stroke="#E8A838" stroke-width="2"/>
