  <path d="M395 95 L400 90 L405 95" fill="none" stroke="#E8A838" stroke-width="2" stroke-linecap="round"/>
  <text x="400" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#E8A838">Hold</text>
  <text x="400" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#A7A9BE">Dranbleiben</text>
  <!-- Payoff -->
  <rect x="540" y="70" width="200" height="200" rx="16" fill="#1A1926" stroke="#E8A838" stroke-width="2"/>
  <rect x="590" y="100" width="100" height="70" rx="8" fill="none" stroke="#FFFFFE" stroke-width="2.5"/>
