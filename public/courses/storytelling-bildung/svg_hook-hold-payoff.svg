  <path d="M625 88 L640 78 L655 88" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
  <path d="M630 95 L640 85 L650 95" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
  <text x="640" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#E8A838">Payoff</text>
  <text x="640" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#A7A9BE">Belohnung</text>
