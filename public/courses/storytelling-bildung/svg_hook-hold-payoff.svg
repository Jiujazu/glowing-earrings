<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#1A1926"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#A7A9BE" letter-spacing="0.1em">MODELL NACH CHRISTINA MARIA SCHOLLERER</text>
  <!-- Hook -->
  <rect x="60" y="70" width="200" height="200" rx="16" fill="#1A1926" stroke="#E8A838" stroke-width="2"/>
