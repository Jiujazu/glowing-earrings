<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#FAFAFA"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid-nz" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="#000" stroke-width="0.5" opacity="0.05"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#000" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid-nz)"/>
  <!-- Center person — square head + body block -->
  <rect x="175" y="145" width="50" height="50" fill="#E8A838" stroke="#000" stroke-width="4"/>
  <rect x="165" y="205" width="70" height="55" fill="#E8A838" stroke="#000" stroke-width="4"/>
  <!-- Incoming arrows — 8 directions, thick black -->
  <!-- Top -->
  <line x1="200" y1="45" x2="200" y2="120" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  <polygon points="188,120 200,140 212,120" fill="#000"/>
  <!-- Bottom -->
  <line x1="200" y1="355" x2="200" y2="285" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  <polygon points="188,285 200,265 212,285" fill="#000"/>
  <!-- Left -->
  <line x1="45" y1="195" x2="130" y2="195" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  <polygon points="130,183 150,195 130,207" fill="#000"/>
  <!-- Right -->
  <line x1="355" y1="195" x2="270" y2="195" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  <polygon points="270,183 250,195 270,207" fill="#000"/>
  <!-- Top-left -->
  <line x1="70" y1="70" x2="140" y2="140" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <polygon points="132,148 155,150 148,128" fill="#000"/>
  <!-- Top-right -->
  <line x1="330" y1="70" x2="260" y2="140" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <polygon points="252,128 245,150 268,148" fill="#000"/>
  <!-- Bottom-left -->
  <line x1="70" y1="330" x2="140" y2="265" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <polygon points="148,272 155,250 132,252" fill="#000"/>
  <!-- Bottom-right -->
  <line x1="330" y1="330" x2="260" y2="265" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <polygon points="268,252 245,250 252,272" fill="#000"/>
  <!-- Small keyword blocks at arrow origins -->
  <rect x="15" y="20" width="50" height="22" fill="#FF6B6B" stroke="#000" stroke-width="2"/>
  <text x="40" y="36" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#FFF" text-anchor="middle">FÜHLEN</text>
  <rect x="170" y="18" width="60" height="22" fill="#E8A838" stroke="#000" stroke-width="2"/>
  <text x="200" y="34" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#000" text-anchor="middle">WISSEN</text>
  <rect x="315" y="45" width="70" height="22" fill="#FF6B6B" stroke="#000" stroke-width="2"/>
  <text x="350" y="61" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#FFF" text-anchor="middle">KONTEXT</text>
  <rect x="10" y="182" width="35" height="22" fill="#E8A838" stroke="#000" stroke-width="2"/>
  <text x="28" y="198" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#000" text-anchor="middle">ZIEL</text>
  <rect x="355" y="182" width="40" height="22" fill="#E8A838" stroke="#000" stroke-width="2"/>
  <text x="375" y="198" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#000" text-anchor="middle">PAIN</text>
  <rect x="30" y="335" width="55" height="22" fill="#E8A838" stroke="#000" stroke-width="2"/>
  <text x="58" y="351" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#000" text-anchor="middle">NIVEAU</text>
  <rect x="315" y="335" width="65" height="22" fill="#FF6B6B" stroke="#000" stroke-width="2"/>
  <text x="348" y="351" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#FFF" text-anchor="middle">EMOTION</text>
  <!-- Main label sticker — bottom center -->
  <rect x="100" y="370" width="200" height="26" fill="#000" stroke="#000" stroke-width="2"/>
  <text x="200" y="389" font-family="system-ui, sans-serif" font-size="12" font-weight="900" fill="#FFF" text-anchor="middle" letter-spacing="2">NUTZERZENTRIERT</text>
  <!-- Decorative star -->
  <polygon points="375,375 380,388 394,388 383,396 387,408 375,400 363,408 367,396 356,388 370,388" fill="#000"/>
  <!-- Decorative tilted square -->
  <rect x="365" y="12" width="18" height="18" fill="#E91E8C" stroke="#000" stroke-width="3" transform="rotate(15 374 21)"/>
</svg>
